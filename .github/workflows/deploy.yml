# IT deploy flow: SSH into Ubuntu server, pull, build on-server, rsync to nginx web root.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   HOST      — server IP (e.g. 111.125.115.4)
#   USERNAME  — SSH user (e.g. astro)
#   SSH_KEY   — full private key file
#   PORT      — SSH port (e.g. 22)

name: Deploy Astro

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Ubuntu Server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /var/www/astro/Natcon_Astro

            git pull origin main

            npm install

            npm run build

            rsync -av --delete dist/ /var/www/html/

            sudo systemctl reload nginx