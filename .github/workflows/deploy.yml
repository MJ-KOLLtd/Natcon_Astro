# Build on GitHub Actions, rsync dist/ to nginx web root via SSH.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   HOST      — server IP (111.125.115.4)
#   USERNAME  — SSH user (astro)
#   SSH_KEY   — valid OpenSSH private key (must include BEGIN/END lines)
#   PORT      — optional SSH port (defaults to 22)

name: Deploy Astro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install and build
        env:
          SITE_URL: https://celogic-natcon.ceals.ph
        run: |
          set -euxo pipefail
          npm ci
          npm run build
          test -f dist/favicon.ico
          test -f dist/favicon-32x32.png
          grep -q 'favicon.ico' dist/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Rsync dist to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /var/www/html/
          remote_host: ${{ secrets.HOST }}
          remote_user: ${{ secrets.USERNAME }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: ${{ secrets.PORT }}

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -euxo pipefail
            test -f /var/www/html/favicon.ico
            sudo systemctl reload nginx

      - name: Verify production favicon
        run: |
          sleep 5
          curl -fsSI "https://celogic-natcon.ceals.ph/favicon.ico" | head -n 1
          curl -fsS "https://celogic-natcon.ceals.ph/" | grep -o 'rel="icon"[^>]*' | head -n 3